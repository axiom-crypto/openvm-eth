name: OpenVM KZG Tests

on:
  push:
    branches: ["main"]
    paths:
      - "crates/kzg/**"
      - "crates/curve-utils/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/tests-kzg.yml"
  pull_request:
    paths:
      - "crates/kzg/**"
      - "crates/curve-utils/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/tests-kzg.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  OPENVM_FAST_TEST: "1"

jobs:
  test:
    runs-on:
      - runs-on=${{ github.run_id }}
      - runner=64cpu-linux-arm64
      - extras=s3-cache

    steps:
      - uses: runs-on/action@v2
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@nextest

      # The KZG integration tests build a zkVM guest via the OpenVM SDK, which
      # compiles with `-Z build-std` using OpenVM's pinned nightly + rust-src.
      # This must match `DEFAULT_RUSTUP_TOOLCHAIN_NAME` in OpenVM's
      # crates/toolchain/build (overridable via the OPENVM_RUST_TOOLCHAIN env var).
      - name: Install OpenVM guest toolchain
        run: |
          rustup install nightly-2026-01-18
          rustup component add rust-src --toolchain nightly-2026-01-18

      - name: Run tests
        run: cargo nextest run -p openvm-kzg --release
