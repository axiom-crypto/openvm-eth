name: "Compare Branches"
run-name: "Compare Branches: ${{ inputs.base_ref }} vs ${{ inputs.target_ref }} (block ${{ inputs.block_number || inputs.block_preset }})"

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base branch/ref to compare (defaults to main)"
        required: false
        type: string
        default: main
      target_ref:
        description: "Target branch/ref to compare"
        required: true
        type: string
      block_preset:
        type: choice
        required: false
        description: Benchmark block preset (see .github/benchmark-blocks.json)
        options:
          - p100
          - p99
          - p50
          - bn254-stress
          - p256-heavy
        default: p100
      block_number:
        type: string
        required: false
        description: Ethereum block number (overrides block_preset)
      benchmark_mode:
        type: choice
        required: false
        description: Benchmark mode
        options:
          - execute-host
          - execute
          - execute-metered
          - prove-app
          - prove-stark
          - prove-root
          - prove-evm
        default: prove-stark
      instance_family:
        description: Runner instance family, or multiple families joined with "+" (e.g. g6+g5)
        type: string
        required: false
        default: g7e.2xlarge
      host_flamegraph:
        description: Generate target host flamegraph
        type: boolean
        required: false
        default: false
      guest_flamegraph:
        description: Generate target circuit flamegraphs
        type: boolean
        required: false
        default: false

jobs:
  resolve-block:
    name: "Resolve Benchmark Block"
    runs-on: ubuntu-latest
    outputs:
      block: ${{ steps.resolve.outputs.block }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve block number
        id: resolve
        run: |
          BLOCK="${{ inputs.block_number }}"
          if [[ -z "$BLOCK" ]]; then
            BLOCK=$(jq -er --arg preset "${{ inputs.block_preset }}" '.[$preset].block' .github/benchmark-blocks.json)
          fi
          [[ "$BLOCK" =~ ^[0-9]+$ ]] || { echo "invalid block number: $BLOCK"; exit 1; }
          echo "block=$BLOCK" >> "$GITHUB_OUTPUT"
      - name: Measure precompile mix
        continue-on-error: true
        env:
          RPC_URL: ${{ secrets.RPC_URL_1 }}
        run: python3 .github/scripts/precompile_mix.py "${{ steps.resolve.outputs.block }}" >> "$GITHUB_STEP_SUMMARY"

  run-base-benchmark:
    name: "Run Base Benchmark (${{ inputs.base_ref }})"
    uses: ./.github/workflows/reth-benchmark.yml
    needs: resolve-block
    with:
      ref: ${{ inputs.base_ref }}
      mode: ${{ inputs.benchmark_mode }}
      block_number: ${{ fromJSON(needs.resolve-block.outputs.block) }}
      instance_family: ${{ inputs.instance_family }}
      profiling: none
    secrets: inherit

  run-target-benchmark:
    name: "Run Target Benchmark (${{ inputs.target_ref }})"
    uses: ./.github/workflows/reth-benchmark.yml
    needs: resolve-block
    with:
      ref: ${{ inputs.target_ref }}
      mode: ${{ inputs.benchmark_mode }}
      block_number: ${{ fromJSON(needs.resolve-block.outputs.block) }}
      instance_family: ${{ inputs.instance_family }}
      profiling: none
    secrets: inherit

  target-host-flamegraph:
    name: "Target Host Perf Flamegraph"
    uses: ./.github/workflows/reth-benchmark.yml
    if: ${{ inputs.host_flamegraph }}
    needs: resolve-block
    with:
      ref: ${{ inputs.target_ref }}
      mode: ${{ inputs.benchmark_mode }}
      block_number: ${{ fromJSON(needs.resolve-block.outputs.block) }}
      instance_family: ${{ inputs.instance_family }}
      profiling: host
    secrets: inherit

  target-guest-flamegraph:
    name: "Target Guest Circuit Flamegraphs"
    uses: ./.github/workflows/reth-benchmark.yml
    if: ${{ inputs.guest_flamegraph }}
    needs: resolve-block
    with:
      ref: ${{ inputs.target_ref }}
      mode: ${{ inputs.benchmark_mode }}
      block_number: ${{ fromJSON(needs.resolve-block.outputs.block) }}
      instance_family: ${{ inputs.instance_family }}
      profiling: guest
    secrets: inherit

  compare-results:
    needs:
      - resolve-block
      - run-base-benchmark
      - run-target-benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download base benchmark results
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-base-benchmark.outputs.metric_name }}
          path: ${{ needs.run-base-benchmark.outputs.metric_name }}

      - name: Download target benchmark results
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-target-benchmark.outputs.metric_name }}
          path: ${{ needs.run-target-benchmark.outputs.metric_name }}

      - name: Get openvm REV
        id: get-openvm-rev
        run: |
          RESULT=$(cargo metadata --format-version=1 | jq -r '.packages[] | select(.name=="openvm-sdk") | .source | split("#") | .[1]')
          echo "result=${RESULT}" >> "$GITHUB_OUTPUT"

      - name: Checkout openvm (for openvm-prof)
        run: git clone --depth=1 https://github.com/openvm-org/openvm.git && cd openvm && git fetch --depth=1 origin ${{ steps.get-openvm-rev.outputs.result }} && git checkout ${{ steps.get-openvm-rev.outputs.result }}
      - name: Build openvm-prof
        working-directory: openvm
        run: |
          cargo build -p openvm-prof
          echo "${{ github.workspace }}/openvm/target/debug" >> $GITHUB_PATH

      - name: Compare metrics
        run: |
          BASE_NAME=${{ needs.run-base-benchmark.outputs.metric_name }}
          BASE_JSON=$BASE_NAME/$BASE_NAME.json
          TARGET_NAME=${{ needs.run-target-benchmark.outputs.metric_name }}
          TARGET_JSON=$TARGET_NAME/$TARGET_NAME.json

          openvm-prof --json-paths $TARGET_JSON --prev-json-paths $BASE_JSON
          MD_PATH=${TARGET_JSON%.json}.md
          # Inspired by https://github.com/rustls/rustls/blob/7159373401f253cbaacd276634508e0798a8849f/.github/workflows/icount-bench.yml#L37
          cat $MD_PATH >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workflow Inputs" >> $GITHUB_STEP_SUMMARY
          echo "Base Ref: ${{ inputs.base_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "Target Ref: ${{ inputs.target_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "Instance Family: ${{ inputs.instance_family }}" >> $GITHUB_STEP_SUMMARY
          echo "Benchmark Mode: ${{ inputs.benchmark_mode }}" >> $GITHUB_STEP_SUMMARY
          echo "Block Number: ${{ needs.resolve-block.outputs.block }}" >> $GITHUB_STEP_SUMMARY
