name: "Compare Benchmarks"
run-name: "Compare Benchmarks (block ${{ inputs.block_number || github.event.inputs.block_number }})"

on:
  workflow_dispatch:
    inputs:
      base_rev:
        description: "Base OpenVM revision to compare (defaults to latest main)"
        required: false
        type: string
      target_rev:
        description: "Target OpenVM revision to compare"
        required: true
        type: string
      stark_backend_rev:
        description: "Optional ref for openvm-stark-backend (defaults to pinned develop-v2 rev)"
        required: false
        type: string
      base_guest_target_features:
        description: Base guest RISC-V target features
        type: choice
        required: false
        options:
          - none
          - zicclsm
          - zicclsm-unaligned
        default: none
      target_guest_target_features:
        description: Target guest RISC-V target features
        type: choice
        required: false
        options:
          - none
          - zicclsm
          - zicclsm-unaligned
        default: none
      block_number:
        type: number
        required: false
        description: Ethereum block number
        default: 23992138
      benchmark_mode:
        type: choice
        required: false
        description: Benchmark mode
        options:
          - execute-host
          - execute
          - execute-metered
          - prove-app
          - prove-stark
          - prove-root
          - prove-evm
        default: prove-stark
      instance_family:
        description: Runner instance family, or multiple families joined with "+" (e.g. g6+g5)
        type: string
        required: false
        default: g7e.2xlarge
      host_flamegraph:
        description: Generate target host flamegraph
        type: boolean
        required: false
        default: false
      guest_flamegraph:
        description: Generate target circuit flamegraphs
        type: boolean
        required: false
        default: false

jobs:
  run-base-benchmark:
    name: "Run Base Benchmark"
    uses: ./.github/workflows/update-patches.yml
    with:
      OPENVM_REV: ${{ github.event.inputs.base_rev }}
      STARK_BACKEND_REV: ${{ github.event.inputs.stark_backend_rev }}
      run_benchmark: true
      benchmark_mode: ${{ github.event.inputs.benchmark_mode }}
      benchmark_block_number: ${{ fromJSON(inputs.block_number || github.event.inputs.block_number || '23992138') }}
      instance_family: ${{ github.event.inputs.instance_family }}
      guest_target_features: ${{ github.event.inputs.base_guest_target_features || 'none' }}
    secrets: inherit

  # Only create branch because github workflow_call must run all jobs for "needs"
  patch-target:
    name: "Patch Target"
    uses: ./.github/workflows/update-patches.yml
    with:
      OPENVM_REV: ${{ github.event.inputs.target_rev }}
      STARK_BACKEND_REV: ${{ github.event.inputs.stark_backend_rev }}
      run_benchmark: false
    secrets: inherit

  run-target-benchmark:
    name: "Run Target Benchmark"
    uses: ./.github/workflows/reth-benchmark.yml
    needs: patch-target
    with:
      mode: ${{ github.event.inputs.benchmark_mode }}
      block_number: ${{ fromJSON(inputs.block_number || github.event.inputs.block_number || '23992138') }}
      instance_family: ${{ github.event.inputs.instance_family }}
      ref: ${{ needs.patch-target.outputs.branch_name }}
      tag: ${{ needs.patch-target.outputs.tag }}
      guest_target_features: ${{ github.event.inputs.target_guest_target_features || 'none' }}
      profiling: none
    secrets: inherit

  target-host-flamegraph:
    name: "Target Host Perf Flamegraph"
    uses: ./.github/workflows/reth-benchmark.yml
    if: ${{ github.event.inputs.host_flamegraph == 'true' }}
    needs: patch-target
    with:
      mode: ${{ github.event.inputs.benchmark_mode }}
      block_number: ${{ fromJSON(inputs.block_number || github.event.inputs.block_number || '23992138') }}
      instance_family: ${{ github.event.inputs.instance_family }}
      ref: ${{ needs.patch-target.outputs.branch_name }}
      tag: ${{ needs.patch-target.outputs.tag }}
      guest_target_features: ${{ github.event.inputs.target_guest_target_features || 'none' }}
      profiling: host
    secrets: inherit

  target-guest-flamegraph:
    name: "Target Guest Circuit Flamegraphs"
    uses: ./.github/workflows/reth-benchmark.yml
    if: ${{ github.event.inputs.guest_flamegraph == 'true' }}
    needs: patch-target
    with:
      mode: ${{ github.event.inputs.benchmark_mode }}
      block_number: ${{ fromJSON(inputs.block_number || github.event.inputs.block_number || '23992138') }}
      instance_family: ${{ github.event.inputs.instance_family }}
      ref: ${{ needs.patch-target.outputs.branch_name }}
      tag: ${{ needs.patch-target.outputs.tag }}
      guest_target_features: ${{ github.event.inputs.target_guest_target_features || 'none' }}
      profiling: guest
    secrets: inherit

  compare-results:
    needs:
      - run-base-benchmark
      - run-target-benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download base benchmark results
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-base-benchmark.outputs.metric_name }}
          path: ${{ needs.run-base-benchmark.outputs.metric_name }}

      - name: Download target benchmark results
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-target-benchmark.outputs.metric_name }}
          path: ${{ needs.run-target-benchmark.outputs.metric_name }}

      - name: Checkout openvm (for openvm-prof)
        run: git clone --depth=1 https://github.com/openvm-org/openvm.git
      - name: Build openvm-prof
        working-directory: openvm
        run: |
          cargo build -p openvm-prof
          echo "${{ github.workspace }}/openvm/target/debug" >> $GITHUB_PATH
      - name: Compare metrics
        run: |
          BASE_NAME=${{ needs.run-base-benchmark.outputs.metric_name }}
          TARGET_NAME=${{ needs.run-target-benchmark.outputs.metric_name }}
          BASE_JSON=$(find $BASE_NAME -name "*.json" | head -1)
          TARGET_JSON=$(find $TARGET_NAME -name "*.json" | head -1)
          BASE_REPORT_JSON=${BASE_JSON%.json}.report.json
          TARGET_REPORT_JSON=${TARGET_JSON%.json}.report.json

          scripts/clean_proof_metrics.sh "$BASE_JSON" "$BASE_REPORT_JSON"
          scripts/clean_proof_metrics.sh "$TARGET_JSON" "$TARGET_REPORT_JSON"
          openvm-prof --json-paths "$TARGET_REPORT_JSON" --prev-json-paths "$BASE_REPORT_JSON"
          MD_PATH=${TARGET_REPORT_JSON%.json}.md
          cat $MD_PATH >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workflow Inputs" >> $GITHUB_STEP_SUMMARY
          echo "Base OpenVM Revision: ${{ github.event.inputs.base_rev }}" >> $GITHUB_STEP_SUMMARY
          echo "Target OpenVM Revision: ${{ github.event.inputs.target_rev }}" >> $GITHUB_STEP_SUMMARY
          echo "Base Guest Target Features: ${{ github.event.inputs.base_guest_target_features }}" >> $GITHUB_STEP_SUMMARY
          echo "Target Guest Target Features: ${{ github.event.inputs.target_guest_target_features }}" >> $GITHUB_STEP_SUMMARY
          echo "Instance Family: ${{ github.event.inputs.instance_family }}" >> $GITHUB_STEP_SUMMARY
          echo "Benchmark Mode: ${{ github.event.inputs.benchmark_mode }}" >> $GITHUB_STEP_SUMMARY
          echo "Block Number: ${{ github.event.inputs.block_number }}" >> $GITHUB_STEP_SUMMARY
