name: "Compare Benchmarks"
run-name: "Compare Benchmarks (block ${{ inputs.block_number || inputs.block_preset }})"

on:
  workflow_dispatch:
    inputs:
      base_rev:
        description: "Base OpenVM revision to compare (defaults to latest main)"
        required: false
        type: string
      target_rev:
        description: "Target OpenVM revision to compare"
        required: true
        type: string
      block_preset:
        type: choice
        required: false
        description: Benchmark block preset (see .github/benchmark-blocks.json)
        options:
          - p100
          - p99
          - p50
          - bn254-stress
          - p256-heavy
        default: p100
      block_number:
        type: string
        required: false
        description: Ethereum block number (overrides block_preset)
      benchmark_mode:
        type: choice
        required: false
        description: Benchmark mode
        options:
          - execute-host
          - execute
          - execute-metered
          - prove-app
          - prove-stark
          - prove-root
          - prove-evm
        default: prove-stark
      instance_family:
        description: Runner instance family, or multiple families joined with "+" (e.g. g6+g5)
        type: string
        required: false
        default: g7e.2xlarge
      host_flamegraph:
        description: Generate target host flamegraph
        type: boolean
        required: false
        default: false
      guest_flamegraph:
        description: Generate target circuit flamegraphs
        type: boolean
        required: false
        default: false

jobs:
  resolve-block:
    name: "Resolve Benchmark Block"
    runs-on: ubuntu-latest
    outputs:
      block: ${{ steps.resolve.outputs.block }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve block number
        id: resolve
        run: |
          BLOCK="${{ inputs.block_number }}"
          if [[ -z "$BLOCK" ]]; then
            BLOCK=$(jq -er --arg preset "${{ inputs.block_preset }}" '.[$preset].block' .github/benchmark-blocks.json)
          fi
          [[ "$BLOCK" =~ ^[0-9]+$ ]] || { echo "invalid block number: $BLOCK"; exit 1; }
          echo "block=$BLOCK" >> "$GITHUB_OUTPUT"
      - name: Measure precompile mix
        continue-on-error: true
        env:
          RPC_URL: ${{ secrets.RPC_URL_1 }}
        run: python3 .github/scripts/precompile_mix.py "${{ steps.resolve.outputs.block }}" >> "$GITHUB_STEP_SUMMARY"

  run-base-benchmark:
    name: "Run Base Benchmark"
    uses: ./.github/workflows/update-patches.yml
    needs: resolve-block
    with:
      OPENVM_REV: ${{ github.event.inputs.base_rev }}
      run_benchmark: true
      benchmark_mode: ${{ github.event.inputs.benchmark_mode }}
      benchmark_block_number: ${{ fromJSON(needs.resolve-block.outputs.block) }}
      instance_family: ${{ github.event.inputs.instance_family }}
    secrets: inherit

  # Only create branch because github workflow_call must run all jobs for "needs"
  patch-target:
    name: "Patch Target"
    uses: ./.github/workflows/update-patches.yml
    with:
      OPENVM_REV: ${{ github.event.inputs.target_rev }}
      run_benchmark: false
    secrets: inherit

  run-target-benchmark:
    name: "Run Target Benchmark"
    uses: ./.github/workflows/reth-benchmark.yml
    needs: [patch-target, resolve-block]
    with:
      mode: ${{ github.event.inputs.benchmark_mode }}
      block_number: ${{ fromJSON(needs.resolve-block.outputs.block) }}
      instance_family: ${{ github.event.inputs.instance_family }}
      ref: ${{ needs.patch-target.outputs.branch_name }}
      tag: ${{ needs.patch-target.outputs.tag }}
      profiling: none
    secrets: inherit

  target-host-flamegraph:
    name: "Target Host Perf Flamegraph"
    uses: ./.github/workflows/reth-benchmark.yml
    if: ${{ github.event.inputs.host_flamegraph == 'true' }}
    needs: [patch-target, resolve-block]
    with:
      mode: ${{ github.event.inputs.benchmark_mode }}
      block_number: ${{ fromJSON(needs.resolve-block.outputs.block) }}
      instance_family: ${{ github.event.inputs.instance_family }}
      ref: ${{ needs.patch-target.outputs.branch_name }}
      tag: ${{ needs.patch-target.outputs.tag }}
      profiling: host
    secrets: inherit

  target-guest-flamegraph:
    name: "Target Guest Circuit Flamegraphs"
    uses: ./.github/workflows/reth-benchmark.yml
    if: ${{ github.event.inputs.guest_flamegraph == 'true' }}
    needs: [patch-target, resolve-block]
    with:
      mode: ${{ github.event.inputs.benchmark_mode }}
      block_number: ${{ fromJSON(needs.resolve-block.outputs.block) }}
      instance_family: ${{ github.event.inputs.instance_family }}
      ref: ${{ needs.patch-target.outputs.branch_name }}
      tag: ${{ needs.patch-target.outputs.tag }}
      profiling: guest
    secrets: inherit

  compare-results:
    needs:
      - resolve-block
      - run-base-benchmark
      - run-target-benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download base benchmark results
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-base-benchmark.outputs.metric_name }}
          path: ${{ needs.run-base-benchmark.outputs.metric_name }}

      - name: Download target benchmark results
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-target-benchmark.outputs.metric_name }}
          path: ${{ needs.run-target-benchmark.outputs.metric_name }}

      - name: Checkout openvm (for openvm-prof)
        run: git clone --depth=1 https://github.com/openvm-org/openvm.git
      - name: Build openvm-prof
        working-directory: openvm
        run: |
          cargo build -p openvm-prof
          echo "${{ github.workspace }}/openvm/target/debug" >> $GITHUB_PATH
      - name: Compare metrics
        run: |
          BASE_NAME=${{ needs.run-base-benchmark.outputs.metric_name }}
          TARGET_NAME=${{ needs.run-target-benchmark.outputs.metric_name }}
          BASE_JSON=$(find $BASE_NAME -name "*.json" | head -1)
          TARGET_JSON=$(find $TARGET_NAME -name "*.json" | head -1)

          openvm-prof --json-paths $TARGET_JSON --prev-json-paths $BASE_JSON
          MD_PATH=${TARGET_JSON%.json}.md
          cat $MD_PATH >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workflow Inputs" >> $GITHUB_STEP_SUMMARY
          echo "Base OpenVM Revision: ${{ github.event.inputs.base_rev }}" >> $GITHUB_STEP_SUMMARY
          echo "Target OpenVM Revision: ${{ github.event.inputs.target_rev }}" >> $GITHUB_STEP_SUMMARY
          echo "Instance Family: ${{ github.event.inputs.instance_family }}" >> $GITHUB_STEP_SUMMARY
          echo "Benchmark Mode: ${{ github.event.inputs.benchmark_mode }}" >> $GITHUB_STEP_SUMMARY
          echo "Block Number: ${{ needs.resolve-block.outputs.block }}" >> $GITHUB_STEP_SUMMARY
