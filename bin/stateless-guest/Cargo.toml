[workspace]
[package]
name = "openvm-stateless-guest"
description = "OpenVM Reth Stateless Guest Program"
version = "0.4.0"
edition = "2021"

[dependencies]
# workspace
openvm-stateless-executor = { path = "../../crates/stateless-executor", features = ["openvm"] }

# openvm
openvm = { git = "https://github.com/openvm-org/openvm.git", branch = "perf/sw-ec-projective-INT-6136", features = [
    "std",
] }
openvm-algebra-guest = { git = "https://github.com/openvm-org/openvm.git", branch = "perf/sw-ec-projective-INT-6136" }
openvm-ecc-guest = { git = "https://github.com/openvm-org/openvm.git", branch = "perf/sw-ec-projective-INT-6136" }

# Pin alloy to 1.6.x: >=1.6 adds verify_and_compute_signer_unchecked to CryptoProvider,
# but 1.7+ requires rustc 1.91 while cargo-openvm guest build uses rustc 1.90
alloy-consensus = { version = ">=1.6, <1.7", default-features = false, features = ["crypto-backend"] }
alloy-eips = { version = ">=1.6, <1.7", default-features = false }
alloy-serde = { version = ">=1.6, <1.7", default-features = false }
alloy-tx-macros = { version = ">=1.6, <1.7", default-features = false }
alloy-genesis = { version = ">=1.6, <1.7", default-features = false }

# Enable std feature for host builds (provides critical-section implementation)
[target.'cfg(not(target_os = "zkvm"))'.dependencies]
openvm-stateless-executor = { path = "../../crates/stateless-executor", features = ["openvm", "std"] }

[package.metadata.cargo-machete]
ignored = ["openvm-algebra-guest", "openvm-ecc-guest"]

[features]
default = []
heap-embedded-alloc = ["openvm/heap-embedded-alloc"]

[profile.release]
panic = "abort"
lto = "fat"
strip = true

[profile.profiling]
inherits = "release"
debug = 2
strip = false
