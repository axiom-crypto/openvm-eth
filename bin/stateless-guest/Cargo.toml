[workspace]
[package]
name = "openvm-stateless-guest"
description = "OpenVM Reth Stateless Guest Program"
version = "0.4.0"
edition = "2021"

[dependencies]
# workspace
openvm-stateless-executor = { path = "../../crates/stateless-executor", default-features = false }

# openvm
# getrandom-unsupported provides openvm's custom getrandom backend (always-errors) and the
# `custom` feature for getrandom 0.2/0.3, which are pulled in transitively (e.g. via k256/p256)
# but never invoked — the stateless executor only verifies, so it needs no RNG. Without this the
# riscv64im-unknown-openvm-elf guest build fails ("getrandom: target is not supported").
openvm = { git = "https://github.com/openvm-org/openvm.git", branch = "develop-v2.1.0-rv64", default-features = false, features = ["getrandom-unsupported"] }
openvm-algebra-guest = { git = "https://github.com/openvm-org/openvm.git", branch = "develop-v2.1.0-rv64", optional = true }
openvm-ecc-guest = { git = "https://github.com/openvm-org/openvm.git", branch = "develop-v2.1.0-rv64", optional = true }

# Enable std feature for host builds (provides critical-section implementation).
# The zkVM guest target now reports target_os = "openvm" (it was "none" before the
# riscv64im-unknown-openvm-elf rename); exclude both so std is only pulled in on the host
# and never cascades into the no_std guest (which would drag in std-only crates like quanta).
[target.'cfg(not(any(target_os = "none", target_os = "openvm")))'.dependencies]
openvm-stateless-executor = { path = "../../crates/stateless-executor", default-features = false, features = ["std"] }

[package.metadata.cargo-machete]
ignored = ["openvm-algebra-guest", "openvm-ecc-guest"]

[features]
default = ["extensions"]
std = ["openvm/std", "openvm-stateless-executor/std"]
extensions = [
    "openvm-stateless-executor/openvm",
    "dep:openvm-algebra-guest",
    "dep:openvm-ecc-guest",
]
heap-embedded-alloc = ["openvm/heap-embedded-alloc"]

[profile.release]
panic = "abort"
lto = "fat"
strip = true

[profile.profiling]
inherits = "release"
debug = 2
strip = false
