[workspace]
[package]
name = "openvm-stateless-guest"
description = "OpenVM Reth Stateless Guest Program"
version = "0.4.0"
edition = "2021"

[dependencies]
# workspace
openvm-stateless-executor = { path = "../../crates/stateless-executor", default-features = false }

# openvm
openvm = { git = "https://github.com/openvm-org/openvm.git", branch = "main", features = [
    "std",
] }
openvm-algebra-guest = { git = "https://github.com/openvm-org/openvm.git", branch = "main", optional = true }
openvm-ecc-guest = { git = "https://github.com/openvm-org/openvm.git", branch = "main", optional = true }

# Enable std feature for host builds (provides critical-section implementation)
[target.'cfg(not(target_os = "zkvm"))'.dependencies]
openvm-stateless-executor = { path = "../../crates/stateless-executor", default-features = false, features = ["std"] }

[package.metadata.cargo-machete]
ignored = ["openvm-algebra-guest", "openvm-ecc-guest"]

[features]
default = ["extensions"]
extensions = [
    "openvm-stateless-executor/openvm",
    "dep:openvm-algebra-guest",
    "dep:openvm-ecc-guest",
]
heap-embedded-alloc = ["openvm/heap-embedded-alloc"]

[profile.release]
panic = "abort"
lto = "fat"
strip = true

[profile.profiling]
inherits = "release"
debug = 2
strip = false

# Open-codes `Uint` equality/`is_zero` so U256 comparisons stop lowering to a
# `memcmp` libcall on rv32. Pending upstream (alloy-rs/ruint#604); replace with
# a version bump once released. Pinned to a 1.17.2-based branch so it stays
# semver-compatible with the guest's resolved `ruint` version.
[patch.crates-io]
ruint = { git = "https://github.com/qumeric/uint", branch = "ruint-eq-1.17.2" }
