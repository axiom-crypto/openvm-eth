[package]
name = "openvm-reth-benchmark"
edition.workspace = true
repository.workspace = true
homepage.workspace = true
exclude.workspace = true
version.workspace = true

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
url.workspace = true
tracing-subscriber.workspace = true
tracing.workspace = true
dotenv = "0.15.0"
clap = { version = "4.5.7", features = ["derive", "env"] }
clap_builder = "4.5.34"
bincode = { workspace = true, features = ["std"] }
hex = "0.4.3"
serde.workspace = true
serde_json.workspace = true
eyre.workspace = true
tokio.workspace = true
zstd.workspace = true
toml.workspace = true

# workspace
openvm-stateless-executor.workspace = true
openvm-rpc-proxy.workspace = true

# alloy
alloy-provider.workspace = true
alloy-rpc-client.workspace = true
alloy-transport.workspace = true
alloy-transport-http = { version = "=2.0.5", default-features = false, features = [
    "reqwest-rustls-tls",
] }

# reth
reth-ethereum-primitives.workspace = true

# Note: the openvm-sdk commit does not need to be exactly the same as the `openvm` commit used in the guest program: as long as
# the openvm-sdk commit doesn't change any guest libraries, they are compatible
# This allows us to not update revm and openvm-kzg each time we change openvm-sdk
openvm-stark-sdk = { git = "https://github.com/openvm-org/stark-backend.git", tag = "v2.0.0", default-features = false }
openvm-cuda-backend = { git = "https://github.com/openvm-org/stark-backend.git", tag = "v2.0.0", default-features = false, optional = true }
openvm-transpiler = { git = "https://github.com/openvm-org/openvm.git", branch = "fix/projective-affine-api", default-features = false }
openvm.workspace = true
openvm-circuit = { git = "https://github.com/openvm-org/openvm.git", branch = "fix/projective-affine-api", default-features = false }
openvm-verify-stark-host = { git = "https://github.com/openvm-org/openvm.git", branch = "fix/projective-affine-api", default-features = false }
openvm-sdk = { git = "https://github.com/openvm-org/openvm.git", branch = "fix/projective-affine-api", default-features = false }
openvm-sdk-config = { git = "https://github.com/openvm-org/openvm.git", branch = "fix/projective-affine-api", default-features = false }

# halo2
halo2-axiom = { git = "https://github.com/axiom-crypto/halo2.git", tag = "v0.5.2", default-features = false, optional = true }

[package.metadata.cargo-machete]
ignored = ["halo2-axiom"]

[package.metadata.cargo-shear]
ignored = ["alloy-transport-http", "halo2-axiom"]

[features]
default = ["parallel", "jemalloc", "metrics"]
parallel = ["openvm-sdk/parallel"]
metrics = ["openvm-sdk/metrics", "openvm-circuit/metrics", "openvm-stark-sdk/metrics"]
tco = ["openvm-sdk/tco"]
rvr = ["openvm-sdk/rvr"]
evm-prove = ["openvm-sdk/evm-prove", "halo2-axiom"]
evm-verify = ["evm-prove", "openvm-sdk/evm-verify", "halo2-axiom"]
perf-metrics = ["openvm-sdk/perf-metrics"]
mimalloc = ["openvm-sdk/mimalloc"]
jemalloc = ["openvm-sdk/jemalloc"]
# x86 only:
halo2-asm = ["halo2-axiom?/asm"]
cuda = ["dep:openvm-cuda-backend", "openvm-sdk/cuda"]
halo2-gpu = ["openvm-sdk/halo2-gpu"]
unprotected = ["openvm-sdk/unprotected"]
nvtx = ["openvm-stark-sdk/nvtx"]
